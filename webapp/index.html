<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warehouse Control</title>
<style>
  :root { --bg: #0d0f14; --surface: #131620; --border: #1f2436; --accent: #4af0b0; --warn: #f0a84a; --text: #d0d4e0; --sans: sans-serif; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; margin: 0; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px; font-weight: bold; }
  main { display: flex; flex: 1; overflow: hidden; }
  aside { width: 300px; background: var(--surface); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  input, button { width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  button { background: var(--accent); color: #000; cursor: pointer; font-weight: bold; border: none; }
  .robot-card { background: var(--bg); padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
  #right { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
  canvas { background: var(--surface); border: 1px solid var(--border); width: 100%; flex: 1; }
</style>
</head>
<body>
<header>Warehouse Control 🟢</header>
<main>
  <aside>
    <h3>Add Task</h3>
    <input type="text" id="inp-item" placeholder="Item Name" />
    <input type="number" id="inp-aisle" min="0" max="2" value="0" placeholder="Aisle (0-2)" />
    <button id="btn-add">Add to Queue</button>
    <h3>Queue</h3>
    <div id="queue-scroll"></div>
  </aside>
  <div id="right">
    <div id="robots"></div>
    <canvas id="map"></canvas>
  </div>
</main>
<script>
let state = { robots: {}, queue: [], aisle_locks: {} };
const ws = new WebSocket(`ws://${location.hostname}:8000/ws/ui`);

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.event === 'state_update') { state = msg.data; render(); }
};

document.getElementById('btn-add').onclick = () => {
  const name = document.getElementById('inp-item').value;
  const aisle = document.getElementById('inp-aisle').value;
  if(name) ws.send(JSON.stringify({event: 'add_item', data: {item_name: name, aisle}}));
};

function render() {
  // Render Queue
  document.getElementById('queue-scroll').innerHTML = state.queue.map(t => 
    `<div style="margin-bottom: 5px; color: ${t.assigned_to ? 'var(--warn)' : '#fff'}">
      [Aisle ${t.aisle}] ${t.item_name} ${t.assigned_to ? '(Picking)' : ''}
    </div>`
  ).join('');

  // Render Robots
  document.getElementById('robots').innerHTML = Object.entries(state.robots).map(([id, r]) => 
    `<div class="robot-card">
      <b>${id}</b> - Status: ${r.status.toUpperCase()} <br>
      Position: [${r.position.x.toFixed(2)}, ${r.position.y.toFixed(2)}]
    </div>`
  ).join('');

  // Render Map
  const cvs = document.getElementById('map');
  cvs.width = cvs.clientWidth; cvs.height = cvs.clientHeight;
  const ctx = cvs.getContext('2d');
  
  const cx = x => ((x + 3.2) / 6.4) * cvs.width;
  const cy = y => cvs.height - ((y + 1) / 5) * cvs.height;

  // Draw Aisles
  [[-2, 2], [0, 2], [2, 2]].forEach(([ax, ay], i) => {
    ctx.fillStyle = state.aisle_locks[i] ? 'rgba(240,168,74,0.3)' : 'rgba(74,240,176,0.3)';
    ctx.fillRect(cx(ax - 0.3), cy(4), cx(ax + 0.3) - cx(ax - 0.3), cy(-1) - cy(4));
    ctx.fillStyle = "#fff"; ctx.fillText("Aisle " + i, cx(ax)-15, cy(ay));
  });

  // Draw Robots
  Object.values(state.robots).forEach(r => {
    if (r.status === 'offline') return;
    ctx.fillStyle = '#4af0b0';
    ctx.beginPath(); ctx.arc(cx(r.position.x), cy(r.position.y), 8, 0, Math.PI*2); ctx.fill();
  });
}
window.onresize = render;
</script>
</body>
</html>
